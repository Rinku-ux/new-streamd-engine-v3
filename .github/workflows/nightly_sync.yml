name: Nightly Data Sync

concurrency:
  group: sync-${{ github.ref }}
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 18 * * *' # 03:00 JST
  workflow_dispatch: # Allow manual trigger
    inputs:
      sync_limit:
        description: 'Maximum number of clients to process'
        required: false
        default: 'None'
      sync_offset:
        description: 'Number of clients to skip'
        required: false
        default: '0'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Sync Script
        id: sync_step
        env:
          REDASH_URL: ${{ secrets.REDASH_URL }}
          REDASH_KEY: ${{ secrets.REDASH_KEY }}
          REDASH_Q993: '993'
          REDASH_Q994: '1004'
          REDASH_Q1011: '1011'
          SYNC_TARGET: 'full'
          SYNC_MODE: 'diff'
          SYNC_LIMIT: ${{ github.event.inputs.sync_limit != 'None' && github.event.inputs.sync_limit || '20000' }}
          SYNC_OFFSET: ${{ github.event.inputs.sync_offset || '0' }}
        run: python sync_cli.py

      - name: Upload Sync Results
        uses: actions/upload-artifact@v4
        with:
          name: streamdbi-latest-data
          path: |
            *.csv
            *.parquet
            *.zip

      # Commit to repository to provide stable URLs
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add streamdbi_data.zip
          git commit -m "Auto-sync: Intermediate update $(date +'%H:%M')" || exit 0
          git push

      - name: Trigger next run if more work remains
        if: steps.sync_step.outputs.has_more == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Sync not finished. Triggering next chunk with offset ${{ steps.sync_step.outputs.next_offset }}..."
          gh workflow run nightly_sync.yml -f sync_offset=${{ steps.sync_step.outputs.next_offset }}
