name: Nightly Data Sync

on:
  schedule:
    - cron: '0 18 * * *' # 03:00 JST
  workflow_dispatch: # Allow manual trigger
    inputs:
      sync_limit:
        description: 'Maximum number of clients to process'
        required: false
        default: 'None'
      sync_offset:
        description: 'Number of clients to skip'
        required: false
        default: '0'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Sync Script
        env:
          REDASH_URL: ${{ secrets.REDASH_URL }}
          REDASH_KEY: ${{ secrets.REDASH_KEY }}
          REDASH_Q993: '993'
          REDASH_Q994: '1004'
          REDASH_Q1011: '1011'
          SYNC_START_DATE: '2024-01'
          SYNC_END_DATE: '2026-12'
          SYNC_TARGET: 'full'
          SYNC_MODE: 'diff'
          SYNC_LIMIT: ${{ github.event.inputs.sync_limit }}
          SYNC_OFFSET: ${{ github.event.inputs.sync_offset }}
        run: python sync_cli.py

      - name: Upload Sync Results
        uses: actions/upload-artifact@v4
        with:
          name: streamdbi-latest-data
          path: |
            *.csv
            *.parquet
            *.zip

      # Commit to repository to provide stable URLs
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add streamdbi_data.zip
          git commit -m "Auto-sync: Updated data ZIP $(date +'%Y-%m-%d')" || exit 0
          git push
