name: Nightly Data Sync

concurrency:
  group: sync-${{ github.ref }}
  # 前runが次runを呼ぶ「直列バケツリレー」のため、falseが最適解
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 18 * * *' # 03:00 JST
  workflow_dispatch:
    inputs:
      sync_limit:
        description: 'Maximum number of clients to process'
        required: false
        default: '20000'
      sync_offset:
        description: 'Number of clients to skip'
        required: false
        default: '0'
      depth:
        description: 'Recursion depth to prevent infinite loops'
        required: false
        default: '0'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download previous zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # キャッシュ専用タグ 'sync-cache' を使用
          gh release download sync-cache -n streamdbi_data.zip || echo "No previous release found, starting fresh."

      - name: Run Sync Script
        id: sync_step
        env:
          REDASH_URL: ${{ secrets.REDASH_URL }}
          REDASH_KEY: ${{ secrets.REDASH_KEY }}
          REDASH_Q993: '993'
          REDASH_Q994: '1004'
          REDASH_Q1011: '1011'
          SYNC_TARGET: 'full'
          SYNC_MODE: 'diff'
          SYNC_LIMIT: ${{ github.event.inputs.sync_limit || '20000' }}
          SYNC_OFFSET: ${{ github.event.inputs.sync_offset || '0' }}
        run: python sync_cli.py

      - name: Upload Sync Results
        uses: actions/upload-artifact@v4
        with:
          name: streamdbi-latest-data
          path: streamdbi_data.zip

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # ファイル存在確認 & race condition対策のrebase
          [ -f sync_status.json ] && git add sync_status.json
          git diff --staged --quiet || (git commit -m "Auto-sync: Intermediate update $(date +'%H:%M')" && git pull --rebase && git push)

      - name: Update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view sync-cache > /dev/null 2>&1; then
            gh release upload sync-cache streamdbi_data.zip --clobber
          else
            gh release create sync-cache streamdbi_data.zip --title "Sync Data Cache" --notes "Internal cache for nightly data sync."
          fi

      - name: Trigger next run if more work remains
        if: steps.sync_step.outputs.has_more == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT_DEPTH: ${{ github.event.inputs.depth }}
          SYNC_LIMIT: ${{ github.event.inputs.sync_limit || '20000' }}
        run: |
          # 変数空文字時のエラーを防止
          SAFE_DEPTH=${CURRENT_DEPTH:-0}
          
          if [ "$SAFE_DEPTH" -ge 20 ]; then
            echo "::error::Max recursion depth reached ($SAFE_DEPTH). Stopping to prevent infinite loop."
            exit 1
          fi
          
          NEXT_DEPTH=$(( SAFE_DEPTH + 1 ))
          echo "Sync not finished. Triggering next chunk (Offset: ${{ steps.sync_step.outputs.next_offset }}, Depth: $NEXT_DEPTH)..."
          
          # 堅牢化のため Workflow name で発火
          gh workflow run "Nightly Data Sync" \
            -f sync_offset=${{ steps.sync_step.outputs.next_offset }} \
            -f depth=$NEXT_DEPTH \
            -f sync_limit="$SYNC_LIMIT"
